<body>
<span class="time" style="background-image:linear-gradient(to bottom, #ED4264, #FFEDBC);color: transparent;-webkit-background-clip:text;font-size:75px"></span>

<script>
 var starttime = new Date("2021/6/26");
 setInterval(function() {
     var nowtime = new Date();
     var time = starttime - nowtime;
     var day = parseInt(time / 1000 / 60 / 60 / 24);
     var hour = parseInt(time / 1000 / 60 / 60 % 24);
     var minute = parseInt(time / 1000 / 60 % 60);
     var seconds = parseInt(time / 1000 % 60);
     $('.time').html("距离中考仅剩" + day + "天" + hour + "时" + minute + "分" + seconds + "秒");
 }, 1200);
</script>

<div class='colorful'>『未经一番寒彻骨 焉得梅花扑鼻香』</div>
